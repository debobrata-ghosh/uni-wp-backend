name: Deploy themes + plugins to AWS

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.AWS_HOST }}
          username: ${{ vars.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: ${{ vars.AWS_PORT }}
          script: |
            set -e
            mkdir -p "${{ vars.AWS_WP_PATH }}/wp-content/themes" "${{ vars.AWS_WP_PATH }}/wp-content/plugins"

      - name: Rsync themes
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: wp-content/themes/
          remote_path: ${{ vars.AWS_WP_PATH }}/wp-content/themes/
          remote_host: ${{ vars.AWS_HOST }}
          remote_user: ${{ vars.AWS_USER }}
          remote_key: ${{ secrets.AWS_SSH_KEY }}
          remote_port: ${{ vars.AWS_PORT }}

      - name: Rsync plugins
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: wp-content/plugins/
          remote_path: ${{ vars.AWS_WP_PATH }}/wp-content/plugins/
          remote_host: ${{ vars.AWS_HOST }}
          remote_user: ${{ vars.AWS_USER }}
          remote_key: ${{ secrets.AWS_SSH_KEY }}
          remote_port: ${{ vars.AWS_PORT }}

